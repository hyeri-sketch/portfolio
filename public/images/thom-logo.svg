<svg width="340" height="56" viewBox="0 0 340 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tombGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3D7F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="tombGradWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3D7F"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Tombstone: rounded arch top + rectangular body -->
  <path d="
    M6 54
    L6 26
    A14 14 0 0 1 34 26
    L34 54
    Z
  " fill="url(#tombGrad)" rx="2"/>

  <!-- Heart on top of tombstone -->
  <path d="
    M20 22
    C20 22 10 15 10 9
    C10 5.5 12.8 3 16 3
    C17.8 3 19.2 3.9 20 5.2
    C20.8 3.9 22.2 3 24 3
    C27.2 3 30 5.5 30 9
    C30 15 20 22 20 22Z
  " fill="#FF3D7F"/>

  <!-- Cross on tombstone -->
  <rect x="19" y="32" width="2" height="14" fill="rgba(255,255,255,0.2)" rx="1"/>
  <rect x="14" y="37" width="12" height="2" fill="rgba(255,255,255,0.2)" rx="1"/>

  <!-- THE HEART OF MATTER text — two lines -->
  <text
    x="46" y="22"
    font-family="Comfortaa, cursive"
    font-weight="700"
    font-size="19"
    letter-spacing="1.5"
    fill="#1A1A1A"
  >THE HEART</text>
  <text
    x="46" y="46"
    font-family="Comfortaa, cursive"
    font-weight="700"
    font-size="19"
    letter-spacing="1.5"
    fill="#1A1A1A"
  >OF MATTER</text>
</svg>
